spring:
  application:
    name: SistemaConsultas

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sistema_consultas}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}

    show-sql: true

    properties:
      hibernate:
        format_sql: true

jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}